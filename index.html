<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CN Passport Photo</title>
  <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <!-- iOS 支持 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="CN Passport Photo">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; margin: 0; background: #f6f6f6; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 12px; }
    .card { background: #fff; border-radius: 14px; padding: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.06); margin-bottom: 12px; }
    .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    button, select, input[type="range"] {
      border-radius: 10px; border: 1px solid #ddd; padding: 10px 12px; background: #fff;
      font-size: 14px;
    }
    button { cursor: pointer; }
    button.primary { background: #111; color: #fff; border-color: #111; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .hint { font-size: 13px; color: #555; line-height: 1.45; }
    .stage { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 900px){ .stage { grid-template-columns: 1.3fr .7fr; } }

    /* 裁剪区：固定比例 33:48 */
    .cropbox {
      position: relative;
      width: 100%;
      aspect-ratio: 33 / 48;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #e3e3e3;
      touch-action: none;
    }
    .cropbox canvas { width: 100%; height: 100%; display: block; background: #fff; }
    .overlay {
      position: absolute; inset: 0; pointer-events: none;
    }
    /* 参考线：顶边留白 3-5mm（取中间值约 4mm），下巴到下边缘 >=7mm（取 7mm线） */
    /* 用比例近似：照片高48mm，4mm≈8.33%，7mm≈14.58% */
    .line { position: absolute; left: 0; right: 0; height: 0; border-top: 2px dashed rgba(0,0,0,.35); }
    .topgap { top: 8.33%; }
    .bottomchin { bottom: 14.58%; }
    /* 中线 & 脸部安全框（大致提示） */
    .vline { position: absolute; top: 0; bottom: 0; left: 50%; width: 0; border-left: 2px dashed rgba(0,0,0,.25); }
    .safe {
      position: absolute;
      left: 18%;
      right: 18%;
      top: 18%;
      bottom: 18%;
      border: 2px dashed rgba(0,0,0,.18);
      border-radius: 10px;
    }

    .thumb { width: 100%; border-radius: 14px; border: 1px solid #e3e3e3; background: #fff; }
    .kvs { display: grid; grid-template-columns: auto 1fr; gap: 6px 10px; font-size: 13px; color: #444; }
    .kvs div:nth-child(odd){ color: #666; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="row" style="justify-content: space-between;">
        <div style="font-size:16px;">中国护照/旅行证照片裁剪</div>
        <div class="row">
          <label class="hint">导出DPI：
            <select id="dpi">
              <option value="300" selected>300</option>
              <option value="600">600</option>
            </select>
          </label>
          <label class="hint">格式：
            <select id="fmt">
              <option value="image/jpeg" selected>JPG</option>
              <option value="image/png">PNG</option>
            </select>
          </label>
        </div>
      </div>
      <div class="hint" style="margin-top:8px;">
        用法：拍照/选照片 → 用一根手指拖动位置、两根手指缩放 → 让头顶接近“顶边留白线”、下巴不要低于“下巴线”，脸尽量在中间 → 导出。
      </div>
    </div>

    <div class="stage">
      <div class="card">
        <div class="row">
          <input id="file" type="file" accept="image/*" capture="environment" />
          <button id="fit" disabled>自动适配</button>
          <button id="reset" disabled>重置</button>
        </div>

        <div style="height:12px;"></div>

        <div class="cropbox" id="cropbox">
          <canvas id="cv"></canvas>
          <div class="overlay">
            <div class="line topgap" title="建议头顶留白 3–5mm（约在此线附近）"></div>
            <div class="line bottomchin" title="下巴不要低于此线（下颚以下到下边缘≥7mm）"></div>
            <div class="vline" title="居中参考线"></div>
            <div class="safe" title="大致安全区域提示"></div>
          </div>
        </div>

        <div style="height:12px;"></div>

        <div class="row">
          <label class="hint">缩放：
            <input id="zoom" type="range" min="0.5" max="3" step="0.01" value="1" disabled />
          </label>
          <label class="hint">旋转：
            <input id="rot" type="range" min="-10" max="10" step="0.1" value="0" disabled />
          </label>
          <button id="export" class="primary" disabled>导出 33×48mm</button>
        </div>

        <div class="hint" style="margin-top:8px;">
          提示：照片要求里“面部或背景无阴影、白底、清晰”，这些是拍摄质量问题，裁剪无法补救。最好靠窗自然光、背景纯白墙、相机与人脸平齐。
        </div>
      </div>

      <div class="card">
        <div class="hint" style="margin-bottom:8px;">导出预览</div>
        <img id="outImg" class="thumb" alt="导出预览" />
        <div style="height:10px;"></div>
        <div class="kvs">
          <div>目标尺寸</div><div id="targetSize">-</div>
          <div>像素尺寸</div><div id="pxSize">-</div>
          <div>文件大小</div><div id="fileSize">-</div>
        </div>
        <div style="height:12px;"></div>
        <div class="row">
          <a id="dl" download="passport_33x48.jpg" style="display:none;">下载</a>
          <button id="share" disabled>分享到手机</button>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  // 33mm x 48mm
  const MM_W = 33, MM_H = 48;
  const ASPECT = MM_W / MM_H;

  const fileEl = document.getElementById('file');
  const dpiEl  = document.getElementById('dpi');
  const fmtEl  = document.getElementById('fmt');
  const cv     = document.getElementById('cv');
  const ctx    = cv.getContext('2d', { alpha: false });
  const cropbox= document.getElementById('cropbox');
  const zoomEl = document.getElementById('zoom');
  const rotEl  = document.getElementById('rot');

  const btnFit   = document.getElementById('fit');
  const btnReset = document.getElementById('reset');
  const btnExport= document.getElementById('export');

  const outImg = document.getElementById('outImg');
  const targetSize = document.getElementById('targetSize');
  const pxSize = document.getElementById('pxSize');
  const fileSize = document.getElementById('fileSize');
  const dl = document.getElementById('dl');
  const btnShare = document.getElementById('share');

  targetSize.textContent = `${MM_W}mm × ${MM_H}mm`;

  // 状态
  let img = null;
  let imgW=0, imgH=0;
  let panX=0, panY=0;    // 以“图像像素”为单位的平移（在画布中心坐标系里）
  let scale=1;
  let rot=0;             // 弧度
  let isDragging=false;
  let last = {x:0,y:0};
  let lastDist = null;

  function enableUI(on){
    btnFit.disabled = !on;
    btnReset.disabled = !on;
    btnExport.disabled = !on;
    zoomEl.disabled = !on;
    rotEl.disabled = !on;
    btnShare.disabled = !on;
  }

  function setCanvasSizeToBox(){
    const r = cropbox.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    cv.width  = Math.round(r.width * dpr);
    cv.height = Math.round(r.height * dpr);
    cv.style.width = r.width + 'px';
    cv.style.height= r.height + 'px';
    draw();
  }

  window.addEventListener('resize', setCanvasSizeToBox);

  function draw(){
    if(!img){
      ctx.fillStyle = '#fff';
      ctx.fillRect(0,0,cv.width,cv.height);
      return;
    }
    ctx.save();
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,cv.width,cv.height);

    // 画布中心
    const cx = cv.width/2, cy=cv.height/2;
    ctx.translate(cx, cy);
    ctx.rotate(rot);

    // 计算缩放：把图片按 scale 缩放后绘制在中心，再用 pan 偏移
    // scale=1 表示“适配裁剪框”的基础缩放（由 fit() 给出），再乘用户缩放
    const base = scale;

    const drawW = imgW * base;
    const drawH = imgH * base;

    ctx.translate(panX*base, panY*base);
    ctx.drawImage(img, -drawW/2, -drawH/2, drawW, drawH);

    ctx.restore();
  }

  // 自动适配：让图片刚好覆盖裁剪框（cover）
  function fit(){
    if(!img) return;
    // 在不旋转下，求 cover 缩放
    const sx = cv.width / imgW;
    const sy = cv.height/ imgH;
    const cover = Math.max(sx, sy);
    scale = cover;
    panX = 0; panY = 0;
    rot = 0;
    zoomEl.value = 1;
    rotEl.value = 0;
    draw();
  }

  function reset(){
    fit();
  }

  // 把当前裁剪框内容导出为指定像素尺寸（按mm与dpi换算）
  function exportImage(){
    const dpi = Number(dpiEl.value || 300);
    const outW = Math.round((MM_W/25.4) * dpi);
    const outH = Math.round((MM_H/25.4) * dpi);

    // 用离屏canvas重新渲染，避免受屏幕dpr影响
    const out = document.createElement('canvas');
    out.width = outW;
    out.height= outH;
    const octx = out.getContext('2d', { alpha: false });

    octx.fillStyle = '#fff';
    octx.fillRect(0,0,outW,outH);

    // 把当前“裁剪框画布”内容映射到输出尺寸
    // 关键：重用同一套变换，但把 cv 的坐标系等比映射到 out
    // 先把当前cv内容渲染到中间：我们直接调用 draw 到一个临时画布更简单
    // 这里：用现有状态在 out 上重画一遍
    octx.save();
    const cx = outW/2, cy = outH/2;
    octx.translate(cx, cy);
    octx.rotate(rot);

    const sx = outW / cv.width;
    const sy = outH / cv.height;

    // 让“图像到cv”的缩放与平移按输出比例缩放
    const base = scale * Math.min(sx, sy); // sx==sy（同比例），这里稳妥写法
    const drawW = imgW * base;
    const drawH = imgH * base;

    octx.translate(panX*base, panY*base);
    octx.drawImage(img, -drawW/2, -drawH/2, drawW, drawH);
    octx.restore();

    const mime = fmtEl.value || 'image/jpeg';
    const quality = (mime === 'image/jpeg') ? 0.92 : undefined;

    out.toBlob((blob) => {
      if(!blob) return;
      const url = URL.createObjectURL(blob);

      outImg.src = url;
      pxSize.textContent = `${outW} × ${outH} px`;
      fileSize.textContent = `${(blob.size/1024).toFixed(1)} KB`;

      // 下载链接
      const ext = (mime === 'image/png') ? 'png' : 'jpg';
      dl.href = url;
      dl.download = `passport_${MM_W}x${MM_H}_${dpi}dpi.${ext}`;
      dl.style.display = 'inline-block';
      dl.textContent = '下载导出文件';

      // 分享
      btnShare.disabled = false;
      btnShare.onclick = async () => {
        try{
          const file = new File([blob], dl.download, { type: mime });
          if(navigator.canShare && navigator.canShare({ files: [file] })){
            await navigator.share({ files: [file], title: '护照照片', text: '33×48mm' });
          }else{
            // 不支持就提示用下载
            alert('此浏览器不支持直接分享，请点击“下载导出文件”。');
          }
        }catch(e){
          alert('分享失败，可改用“下载导出文件”。');
        }
      };
    }, mime, quality);
  }

  // 交互：触摸拖动/双指缩放
  function getPoint(e){
    const r = cv.getBoundingClientRect();
    return { x: (e.clientX - r.left) * (cv.width / r.width),
             y: (e.clientY - r.top ) * (cv.height/ r.height) };
  }

  function onPointerDown(e){
    if(!img) return;
    cv.setPointerCapture?.(e.pointerId);
    isDragging = true;
    last = getPoint(e);
  }

  function onPointerMove(e){
    if(!img) return;
    if(!isDragging) return;
    const p = getPoint(e);
    const dx = p.x - last.x;
    const dy = p.y - last.y;
    last = p;

    // dx,dy 是画布像素，换算回“图像像素平移量”
    // 因为 draw 里 panX*scale 作用在画布坐标，所以 panX变化 = dx/scale
    panX += dx / scale;
    panY += dy / scale;
    draw();
  }

  function onPointerUp(e){
    isDragging = false;
  }

  // 额外：用滚轮缩放（电脑调试方便）
  cv.addEventListener('wheel', (e) => {
    if(!img) return;
    e.preventDefault();
    const delta = Math.sign(e.deltaY);
    const factor = delta > 0 ? 0.97 : 1.03;
    zoomEl.value = Math.min(3, Math.max(0.5, Number(zoomEl.value) * factor));
    applyZoomRot();
  }, { passive: false });

  function applyZoomRot(){
    if(!img) return;
    const userZoom = Number(zoomEl.value);
    const userRot = Number(rotEl.value);
    // fit() 设定 scale 为cover基础，此处用 userZoom 乘上去
    // 为了简单：把 scale 重置为 fitScale * userZoom，需要记录 fitScale
    // 这里：用当前 scale / 当前userZoom 来反推 fitScale（只要用户不改dpi就稳定）
    const currentUserZoom = (window.__userZoomLast || 1);
    const fitScale = scale / currentUserZoom;

    scale = fitScale * userZoom;
    rot = userRot * Math.PI / 180;

    window.__userZoomLast = userZoom;
    draw();
  }

  zoomEl.addEventListener('input', applyZoomRot);
  rotEl.addEventListener('input', applyZoomRot);

  // 加载图片
  fileEl.addEventListener('change', () => {
    const f = fileEl.files && fileEl.files[0];
    if(!f) return;

    const url = URL.createObjectURL(f);
    const im = new Image();
    im.onload = () => {
      img = im;
      imgW = im.naturalWidth;
      imgH = im.naturalHeight;

      setCanvasSizeToBox();
      fit();

      enableUI(true);
      btnShare.disabled = true;
      outImg.src = '';
      dl.style.display = 'none';
      fileSize.textContent = '-';
      pxSize.textContent = '-';
    };
    im.onerror = () => alert('图片读取失败，请换一张。');
    im.src = url;
  });

  btnFit.addEventListener('click', fit);
  btnReset.addEventListener('click', reset);
  btnExport.addEventListener('click', exportImage);

  // 指针事件（兼容触摸）
  cv.addEventListener('pointerdown', onPointerDown);
  cv.addEventListener('pointermove', onPointerMove);
  cv.addEventListener('pointerup', onPointerUp);
  cv.addEventListener('pointercancel', onPointerUp);

  // 初始化
  setCanvasSizeToBox();
  enableUI(false);
})();
</script>
</body>
</html>
